name: EAS Submit to Google Play

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'EAS build ID to submit (leave empty to submit the latest finished Android build)'
        required: false
        default: ''

jobs:
  submit:
    name: Submit (testing)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Write Google Play service account key
        # Path must match submit.testing.android.serviceAccountKeyPath in eas.json
        run: printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > google-play-service-account.json
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Submit to Google Play
        env:
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          if [ -n "$BUILD_ID" ]; then
            eas submit --platform android --profile testing --id "$BUILD_ID" --non-interactive
          else
            eas submit --platform android --profile testing --latest --non-interactive
          fi

      - name: Remove service account key
        if: always()
        run: rm -f google-play-service-account.json
